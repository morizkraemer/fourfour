<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WaveformDisplay dev</title>
    <link rel="stylesheet" href="waveform.css">
    <style>
        body {
            margin: 0;
            background: #111;
            color: #aaa;
            font: 12px/1.5 system-ui;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .toolbar {
            padding: 6px 14px;
            background: #1a1a1a;
            border-bottom: 1px solid #333;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }
        .toolbar label {
            cursor: pointer;
            padding: 4px 10px;
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 4px;
        }
        .toolbar label:hover { background: #333; }
        #file-input { display: none; }
        #track-name { color: #ccc; flex: 1; }
        #status { font-size: 10px; color: #555; white-space: nowrap; }
        #status.active { color: #5ae168; }

        /* Source file tabs */
        #source-tabs {
            display: flex;
            gap: 3px;
            align-items: center;
        }
        .source-tab {
            padding: 3px 9px;
            background: #222;
            border: 1px solid #333;
            border-radius: 3px;
            color: #777;
            font: 11px/1.4 system-ui;
            cursor: pointer;
            white-space: nowrap;
        }
        .source-tab:hover { background: #2c2c2c; color: #aaa; }
        .source-tab.active {
            background: #1e3a5f;
            border-color: #2a6496;
            color: #7ec8e3;
        }
        .source-tab-sep { color: #333; font-size: 10px; padding: 0 2px; }

        /* ── Track rows ── */
        #rows {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .track-row {
            display: flex;
            flex: 1;
            min-height: 0;
            align-items: stretch;
        }
        .track-row + .track-row { border-top: 1px solid #222; }

        /* ── Left sidebar: label + faders ── */
        .row-sidebar {
            width: 200px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 6px 10px;
            gap: 4px;
            border-right: 1px solid #222;
        }
        .row-title {
            font-size: 10px;
            color: #555;
            margin-bottom: 2px;
        }
        .fader-row {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .fader-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .dot-bass { background: #3064ff; }
        .dot-mid  { background: #ff8c00; }
        .dot-high { background: #ddd; }
        input[type=range] {
            -webkit-appearance: none;
            flex: 1;
            height: 3px;
            background: #2e2e2e;
            border-radius: 2px;
            outline: none;
            cursor: pointer;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            cursor: pointer;
        }
        .bass-thumb::-webkit-slider-thumb { background: #3064ff; }
        .mid-thumb::-webkit-slider-thumb  { background: #ff8c00; }
        .high-thumb::-webkit-slider-thumb { background: #ddd; }
        .fader-val {
            min-width: 30px;
            text-align: right;
            font-size: 10px;
            font-variant-numeric: tabular-nums;
            color: #666;
        }

        .waveform-container {
            flex: 1;
            min-width: 0;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <label>+ Load <input type="file" id="file-input" accept=".json"></label>
        <span class="source-tab-sep">|</span>
        <span id="source-tabs"></span>
        <span id="track-name" style="flex:1;padding-left:8px;"></span>
        <span id="status">watching…</span>
    </div>

    <div id="rows"></div>

    <script type="module">
        import WaveformDisplay from './WaveformDisplay.js';

        const rowsEl    = document.getElementById('rows');
        const trackName = document.getElementById('track-name');
        const statusEl  = document.getElementById('status');
        const sourceTabsEl = document.getElementById('source-tabs');

        // ── Source file registry ─────────────────────────────────────────
        // Each source: { name, data }. Rekordbox-format sources update the
        // fixed reference rows; analysis-format sources replace analysis rows.
        const sources = [];
        let activeSourceIdx = -1;

        function renderSourceTabs() {
            sourceTabsEl.innerHTML = '';
            sources.forEach((s, i) => {
                const btn = document.createElement('button');
                btn.className = 'source-tab' + (i === activeSourceIdx ? ' active' : '');
                btn.textContent = s.name;
                btn.title = s.name;
                btn.onclick = () => switchSource(i);
                sourceTabsEl.appendChild(btn);
            });
        }

        function registerSource(name, data) {
            const idx = sources.findIndex(s => s.name === name);
            if (idx >= 0) {
                sources[idx].data = data;
                if (idx === activeSourceIdx) applySource(idx, false);
            } else {
                sources.push({ name, data });
                renderSourceTabs();
                if (sources.length === 1 || isAnalysisFormat(data)) switchSource(sources.length - 1);
            }
        }

        function switchSource(idx) {
            activeSourceIdx = idx;
            renderSourceTabs();
            applySource(idx, true);
        }

        function isAnalysisFormat(data) { return !!data.waveforms; }

        function applySource(idx, resetZoom) {
            const { data } = sources[idx];
            if (isAnalysisFormat(data)) {
                clearAnalysisRows();
                applyAnalysisData(data, resetZoom);
            } else {
                applyRekordboxData(data, resetZoom);
            }
        }

        // ── Row registry ────────────────────────────────────────────────
        // Each entry: { display: WaveformDisplay, data: displayData|null, prefix: string }
        const rows = [];

        function makeRow(label, prefix) {
            const row = document.createElement('div');
            row.className = 'track-row';
            row.innerHTML = `
                <div class="row-sidebar">
                    <div class="row-title">${label}</div>
                    <div class="fader-row">
                        <span class="fader-dot dot-bass"></span>
                        <input type="range" class="bass-thumb" id="${prefix}-bass" min="0" max="200" step="5" value="100">
                        <span class="fader-val" id="${prefix}-bass-val">100%</span>
                    </div>
                    <div class="fader-row">
                        <span class="fader-dot dot-mid"></span>
                        <input type="range" class="mid-thumb" id="${prefix}-mid" min="0" max="200" step="5" value="100">
                        <span class="fader-val" id="${prefix}-mid-val">100%</span>
                    </div>
                    <div class="fader-row">
                        <span class="fader-dot dot-high"></span>
                        <input type="range" class="high-thumb" id="${prefix}-high" min="0" max="200" step="5" value="100">
                        <span class="fader-val" id="${prefix}-high-val">100%</span>
                    </div>
                </div>
                <div class="waveform-container" id="${prefix}-container"></div>
            `;
            rowsEl.appendChild(row);
            const display = new WaveformDisplay(row.querySelector(`#${prefix}-container`));
            const entry = { display, data: null, prefix };
            rows.push(entry);

            // Fader binding
            ['bass', 'mid', 'high'].forEach(band => {
                const slider = document.getElementById(`${prefix}-${band}`);
                const label  = document.getElementById(`${prefix}-${band}-val`);
                slider.addEventListener('input', () => {
                    label.textContent = slider.value + '%';
                    renderRow(entry);
                });
            });

            return entry;
        }

        function gainsFor(prefix) {
            return [
                document.getElementById(prefix + '-bass').value / 100,
                document.getElementById(prefix + '-mid').value  / 100,
                document.getElementById(prefix + '-high').value / 100,
            ];
        }

        function recomputeColors(waveform_color, bassGain, midGain, highGain) {
            return (waveform_color || []).map(c => ({
                amp: c.amp,
                r: Math.min(255, Math.round(c.r * bassGain)),
                g: Math.min(255, Math.round(c.g * midGain)),
                b: Math.min(255, Math.round(c.b * highGain)),
            }));
        }

        function renderRow(entry, resetZoom = false) {
            if (!entry.data) return;
            const [bg, mg, hg] = gainsFor(entry.prefix);
            const painted = {
                ...entry.data,
                waveform_color: recomputeColors(entry.data.waveform_color, bg, mg, hg),
            };
            if (resetZoom) {
                entry.display.setData(painted);
            } else {
                entry.display._data = painted;
                entry.display.redraw();
            }
        }

        // ── Viewport sync ───────────────────────────────────────────────
        let _syncing = false;
        function syncAll(zoom, offset, source) {
            if (_syncing) return;
            _syncing = true;
            rows.forEach(e => {
                if (e !== source) e.display.setViewport(zoom, offset);
            });
            _syncing = false;
        }

        function attachSync(entry) {
            entry.display.onViewportChange = (zoom, offset) => syncAll(zoom, offset, entry);
        }

        // ── Shared base (beats/bpm/duration) ───────────────────────────
        // Waveform_color varies per row; beats/duration shared from data.json.
        function makeDisplayData(waveformColor, base) {
            return {
                waveform_color: waveformColor,
                waveform_preview: base.waveform_preview || [],
                beats: base.beats || [],
                duration_ms: base.duration_ms || 0,
                bpm: base.bpm || 0,
                key: base.key || '',
            };
        }

        // ── Row setup ───────────────────────────────────────────────────
        // Rekordbox rows are created first so analysis rows can be inserted before them.
        // We use placeholder divs so insertBefore works reliably.
        const rbDetailEntry  = makeRow('Rekordbox (detail)', 'rb-detail');
        const rbOverviewEntry = makeRow('Rekordbox (overview)', 'rb-overview');
        attachSync(rbDetailEntry);
        attachSync(rbOverviewEntry);

        // Analysis rows are inserted before the first Rekordbox row.
        const rbDetailRowEl = document.getElementById('rb-detail-container').closest('.track-row');

        let analysisRows = {};   // name → entry

        function clearAnalysisRows() {
            Object.values(analysisRows).forEach(e => {
                const idx = rows.indexOf(e);
                if (idx >= 0) rows.splice(idx, 1);
                e.display.destroy();
                e.rowEl.remove();
            });
            analysisRows = {};
        }

        function ensureAnalysisRows(names) {
            names.forEach(name => {
                if (!analysisRows[name]) {
                    const prefix = 'a-' + name.toLowerCase().replace(/\s+/g, '-');
                    // Build the row DOM element
                    const tempDiv = document.createElement('div');
                    tempDiv.innerHTML = `
                        <div class="track-row">
                            <div class="row-sidebar">
                                <div class="row-title">${name}</div>
                                <div class="fader-row">
                                    <span class="fader-dot dot-bass"></span>
                                    <input type="range" class="bass-thumb" id="${prefix}-bass" min="0" max="200" step="5" value="100">
                                    <span class="fader-val" id="${prefix}-bass-val">100%</span>
                                </div>
                                <div class="fader-row">
                                    <span class="fader-dot dot-mid"></span>
                                    <input type="range" class="mid-thumb" id="${prefix}-mid" min="0" max="200" step="5" value="100">
                                    <span class="fader-val" id="${prefix}-mid-val">100%</span>
                                </div>
                                <div class="fader-row">
                                    <span class="fader-dot dot-high"></span>
                                    <input type="range" class="high-thumb" id="${prefix}-high" min="0" max="200" step="5" value="100">
                                    <span class="fader-val" id="${prefix}-high-val">100%</span>
                                </div>
                            </div>
                            <div class="waveform-container" id="${prefix}-container"></div>
                        </div>
                    `;
                    const rowEl = tempDiv.firstElementChild;
                    rowsEl.insertBefore(rowEl, rbDetailRowEl);

                    const display = new WaveformDisplay(rowEl.querySelector(`#${prefix}-container`));
                    const entry = { display, data: null, prefix, rowEl };
                    rows.push(entry);
                    attachSync(entry);

                    ['bass', 'mid', 'high'].forEach(band => {
                        const slider = document.getElementById(`${prefix}-${band}`);
                        const lbl    = document.getElementById(`${prefix}-${band}-val`);
                        slider.addEventListener('input', () => {
                            lbl.textContent = slider.value + '%';
                            renderRow(entry);
                        });
                    });

                    analysisRows[name] = entry;
                }
            });
        }

        // ── Data loading ────────────────────────────────────────────────
        let prevDataStamp = null;

        async function loadDataJson() {
            const resp = await fetch(`./data.json?t=${Date.now()}`);
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            return resp.json();
        }

        async function loadRekordboxJson() {
            const resp = await fetch(`./rekordbox.json?t=${Date.now()}`);
            if (!resp.ok) return null;
            return resp.json();
        }

        function applyAnalysisData(data, resetZoom = true) {
            const waveforms = data.waveforms || {};
            const names = Object.keys(waveforms);
            ensureAnalysisRows(names);

            names.forEach(name => {
                const entry = analysisRows[name];
                if (!entry) return;
                const cols = waveforms[name];
                if (!cols) return;
                entry.data = makeDisplayData(cols, data);
                renderRow(entry, resetZoom);
            });

            const src = sources[activeSourceIdx];
            const srcLabel = src ? ` — ${src.name}` : '';
            trackName.textContent = `BPM: ${data.bpm?.toFixed(1) ?? '?'}  Key: ${data.key ?? '?'}${srcLabel}`;
        }

        function applyRekordboxData(rbData, resetZoom = true) {
            if (!rbData) return;

            // Detail row — uses waveform_detail (PWV3, ~150 cols/sec)
            if (rbData.waveform_detail?.length) {
                rbDetailEntry.data = makeDisplayData(rbData.waveform_detail, rbData);
            }

            // Overview row — uses waveform_overview (PWV4, 1200 entries)
            // Same beats/duration but lower column density.
            if (rbData.waveform_overview?.length) {
                rbOverviewEntry.data = makeDisplayData(rbData.waveform_overview, rbData);
            }

            renderRow(rbDetailEntry, resetZoom);
            renderRow(rbOverviewEntry, resetZoom);
        }

        function fingerprint(data) {
            const n = data.waveforms
                ? Object.values(data.waveforms).reduce((s, c) => s + (c?.length ?? 0), 0)
                : 0;
            return `${data.bpm}_${n}`;
        }

        // Initial load
        try {
            const data = await loadDataJson();
            prevDataStamp = fingerprint(data);
            registerSource('data.json', data);
            statusEl.textContent = 'watching…';
            statusEl.className = 'active';
        } catch (e) {
            statusEl.textContent = 'no data yet';
        }

        try {
            const rbData = await loadRekordboxJson();
            if (rbData) {
                registerSource('rekordbox.json', rbData);
                applyRekordboxData(rbData, true);
            }
        } catch (_) {}

        // ── Auto-reload every 2 s ───────────────────────────────────────
        async function poll() {
            try {
                const data = await loadDataJson();
                const stamp = fingerprint(data);
                if (stamp !== prevDataStamp) {
                    prevDataStamp = stamp;
                    const idx = sources.findIndex(s => s.name === 'data.json');
                    if (idx >= 0) {
                        sources[idx].data = data;
                        if (idx === activeSourceIdx) applySource(idx, true);
                    }
                    try { applyRekordboxData(await loadRekordboxJson(), true); } catch (_) {}
                    statusEl.textContent = 'reloaded ' + new Date().toLocaleTimeString();
                }
            } catch (_) {}
            setTimeout(poll, 2000);
        }
        setTimeout(poll, 2000);

        // ── Manual file load ────────────────────────────────────────────
        async function loadFile(file) {
            try {
                const data = JSON.parse(await file.text());
                registerSource(file.name, data);
                if (!isAnalysisFormat(data)) applyRekordboxData(data, true);
            } catch (err) { alert('Failed to parse JSON: ' + err); }
        }

        document.getElementById('file-input').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (file) await loadFile(file);
            e.target.value = '';   // allow re-loading same file
        });

        document.addEventListener('dragover', e => e.preventDefault());
        document.addEventListener('drop', async (e) => {
            e.preventDefault();
            const file = [...e.dataTransfer.files].find(f => f.name.endsWith('.json'));
            if (file) await loadFile(file);
        });
    </script>
</body>
</html>
