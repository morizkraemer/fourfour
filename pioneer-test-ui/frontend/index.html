<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pioneer USB Writer - Test</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Drop overlay (shown on drag enter) -->
    <div id="drop-overlay" class="drop-overlay hidden">
        <div class="drop-overlay-inner">Drop audio files here</div>
    </div>

    <div id="app">

        <!-- Toolbar -->
        <div id="toolbar">
            <button id="btn-import" onclick="importFolder()">Import Folder</button>
            <button id="btn-analyze" onclick="analyzeAll()">Analyze All</button>
            <button id="btn-delete" onclick="deleteSelected()" disabled>Delete Selected</button>
            <button id="btn-test-cues" onclick="setTestCues()" disabled>Test Cues</button>
            <div class="toolbar-spacer"></div>
            <label for="usb-select">USB:</label>
            <select id="usb-select" onchange="selectVolume(this.value)">
                <option value="">-- select volume --</option>
            </select>
            <button id="btn-refresh-volumes" onclick="loadVolumes()" title="Refresh volumes">&#8635;</button>
            <button id="btn-eject" onclick="ejectVolume()" title="Eject selected volume">&#9167;</button>
            <button id="btn-wipe" onclick="wipeUsb()">Wipe</button>
            <button id="btn-sync" onclick="syncToUsb()">Sync</button>
            <span id="version-badge"></span>
        </div>

        <!-- Main content: library side | USB side (mirrored) -->
        <div id="main">

            <!-- Library: tracks + playlists -->
            <div class="side library-side">
                <div id="track-panel">
                    <div id="track-table-wrap">
                        <table id="track-table">
                            <thead>
                                <tr>
                                    <th class="col-num">#</th>
                                    <th class="col-title">Title</th>
                                    <th class="col-artist">Artist</th>
                                    <th class="col-bpm">BPM</th>
                                    <th class="col-key">Key</th>
                                    <th class="col-cues">Cues</th>
                                    <th class="col-dur">Duration</th>
                                </tr>
                            </thead>
                            <tbody id="track-tbody">
                                <tr class="empty-row">
                                    <td colspan="7">No tracks loaded. Import a folder or drop files here.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <div id="playlist-panel">
                    <div id="playlist-actions">
                        <span id="selection-count">0 selected</span>
                        <button id="btn-new-playlist" onclick="createPlaylist()">+ New Playlist</button>
                    </div>
                    <div id="playlist-list"></div>
                </div>
            </div>

            <!-- USB: playlists + tracks (mirrored) -->
            <div class="side usb-side">
                <div id="usb-playlist-panel">
                    <div id="usb-playlist-header">
                        <span>USB Playlists</span>
                    </div>
                    <div id="usb-playlist-list"></div>
                </div>
                <div id="usb-panel">
                    <div id="usb-header">
                        <span>USB Tracks</span>
                        <span id="usb-track-count"></span>
                    </div>
                    <div id="usb-table-wrap">
                        <table id="usb-table">
                            <thead>
                                <tr>
                                    <th class="col-title">Title</th>
                                    <th class="col-artist">Artist</th>
                                    <th class="col-bpm">BPM</th>
                                    <th class="col-key">Key</th>
                                    <th class="col-dur">Duration</th>
                                </tr>
                            </thead>
                            <tbody id="usb-tbody">
                                <tr class="empty-row"><td colspan="5">Select a USB volume to view contents</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>

        <!-- Progress bar (bottom) -->
        <div id="progress-bar-wrap" class="hidden">
            <div id="progress-bar-track">
                <div id="progress-bar-fill"></div>
            </div>
            <div id="progress-label">Ready</div>
        </div>

    </div>

    <!-- Simple modal for text input (prompt() doesn't work in Tauri webview) -->
    <dialog id="text-input-dialog">
        <form method="dialog">
            <p id="text-input-label">Name:</p>
            <input type="text" id="text-input-field" autofocus>
            <div style="margin-top:8px;text-align:right;">
                <button type="button" onclick="document.getElementById('text-input-dialog').close()">Cancel</button>
                <button type="submit">OK</button>
            </div>
        </form>
    </dialog>

    <!-- Confirmation dialog for destructive actions -->
    <dialog id="confirm-dialog">
        <p id="confirm-label">Are you sure?</p>
        <div style="margin-top:12px;text-align:right;">
            <button type="button" onclick="document.getElementById('confirm-dialog').close('cancel')">Cancel</button>
            <button type="button" id="confirm-ok-btn" style="background:var(--accent);border-color:var(--accent);color:#fff;" onclick="document.getElementById('confirm-dialog').close('ok')">Wipe</button>
        </div>
    </dialog>

    <script src="app.js"></script>
</body>
</html>
